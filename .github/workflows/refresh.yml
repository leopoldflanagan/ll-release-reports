name: Refresh LL QA Roadmap

# Triggers:
#   - schedule: every 2 hours, every day (UTC — the app shows local time)
#   - schedule: Mon/Wed/Fri at 15:00 UTC (= 10am US Central during daylight saving / CDT;
#               note: becomes 9am when Central switches to standard time / CST in November)
#   - workflow_dispatch: manual "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "0 15 * * 1,3,5"
  workflow_dispatch:

# Allow the job to push the regenerated index.html back to the repo
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync with remote before regenerating
        run: |
          git config user.name  "LL Dashboard Bot"
          git config user.email "actions@github.com"
          git pull --no-rebase -X ours origin main || true

      - name: Refresh dashboard data from Jira
        env:
          JIRA_BASE_URL: https://wellfit.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python3 scripts/refresh_dashboard.py qa-roadmap/data.json

      - name: Commit and push if changed
        run: |
          git config user.name  "LL Dashboard Bot"
          git config user.email "actions@github.com"
          # Bot only ever writes data.json — never the HTML — so conflicts are impossible.
          if git diff --quiet -- qa-roadmap/data.json; then
            echo "No changes - data already up to date."
          else
            git add qa-roadmap/data.json
            git commit -m "Auto-refresh LL QA data ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              if git push; then
                echo "Pushed successfully."
                break
              fi
              echo "Push rejected - syncing with remote and retrying ($i)..."
              git pull --no-rebase -X ours origin main -m "Merge remote data refresh"
            done
          fi
